<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>★ PIXEL CREW ★</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: 'DotGothic16', 'Noto Sans KR', monospace; }

    @keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes twinkle  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.2;transform:scale(.5)} }
    @keyframes slideUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
    @keyframes heartPop { 0%{transform:scale(0) translateY(0);opacity:1} 100%{transform:scale(1.5) translateY(-40px);opacity:0} }
    @keyframes scanline { 0%{background-position:0 0} 100%{background-position:0 4px} }

    .slide-up { animation: slideUp .22s ease-out both; }
    .float-anim { animation: float 3s ease-in-out infinite; }

    /* Sims-style button */
    .sims-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(225,240,210,.93);
      border: 1.5px solid rgba(80,130,50,.55);
      border-radius: 22px;
      padding: 6px 16px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px; font-weight: 700;
      color: #1a3a0a;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.6);
      transition: all .14s ease;
      white-space: nowrap;
      user-select: none;
    }
    .sims-btn:hover { background: rgba(200,230,175,.97); transform: translateY(-2px) scale(1.04); box-shadow: 0 4px 14px rgba(0,0,0,.28); }
    .sims-btn:active { transform: translateY(0) scale(.97); }

    /* XP win chrome */
    .win-wrap { border:2px solid #003380; border-radius:8px 8px 4px 4px; box-shadow:2px 2px 0 #000,inset 0 0 0 1px rgba(255,255,255,.25); overflow:hidden; }
    .win-bar { background:linear-gradient(180deg,#2a7fff 0%,#1056c0 45%,#0844af 46%,#1a6bea 100%); padding:5px 8px; display:flex; align-items:center; justify-content:space-between; }
    .win-bar-txt { color:#fff; font-size:7px; font-family:'Press Start 2P',monospace; letter-spacing:1px; text-shadow:1px 1px 2px rgba(0,0,0,.5); }
    .win-btns { display:flex; gap:3px; }
    .win-btn { width:16px; height:14px; border-radius:3px; border:1px solid rgba(0,0,0,.4); font-size:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:bold; }
    .win-btn-x { background:linear-gradient(180deg,#ff8a8a,#d93232); color:#fff; }
    .win-btn-n { background:linear-gradient(180deg,#ffe087,#d4a800); color:#333; }
    .win-btn-m { background:linear-gradient(180deg,#8af77a,#3cb800); color:#333; }

    /* CRT scanlines overlay */
    .crt-lines { position:absolute; inset:0; pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
      border-radius:inherit; }
  </style>
</head>
<body>
<div id="root"></div>

      <svg viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" style={{width:'100%',height:'100%',display:'block'}}>
        <defs>
          <linearGradient id="xpSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#1a6bbf"/>
            <stop offset="45%" stopColor="#4a9de0"/>
            <stop offset="100%" stopColor="#87ceeb"/>
          </linearGradient>
          <radialGradient id="sunGlow" cx="70%" cy="20%" r="30%">
            <stop offset="0%" stopColor="rgba(255,255,200,.35)"/>
            <stop offset="100%" stopColor="rgba(255,255,200,0)"/>

          <g key={i} transform={`translate(${x},${y}) scale(${s})`} opacity=".9">
            <ellipse cx="30" cy="20" rx="30" ry="18" fill="white"/>
            <ellipse cx="55" cy="14" rx="25" ry="16" fill="white"/>
            <ellipse cx="80" cy="18" rx="28" ry="15" fill="white"/>
            <ellipse cx="55" cy="22" rx="40" ry="14" fill="white"/>

        <ellipse cx="20%" cy="500" rx="40%" ry="22%" fill="#6BAF35"/>

/* ═══ WIN CHROME ═══ */
function WinChrome({title,children,onClose,accentBar}) {
  return (
    <div className="win-wrap" style={{animation:'slideUp .3s ease-out'}}>
      <div className="win-bar" style={accentBar?{background:`linear-gradient(180deg,${accentBar}cc,${accentBar}88)`}:{}}>
        <span className="win-bar-txt">{title}</span>
        <div className="win-btns">
          <div className="win-btn win-btn-n">─</div>
          <div className="win-btn win-btn-m">□</div>
          <div className="win-btn win-btn-x" onClick={onClose}>✕</div>
        </div>
      </div>
      {children}
    </div>
  );
}

/* ═══ TITLE SCREEN ═══ */
function TitleScreen({tweaks,onStart}) {
  const [blink,setBlink]=useState(true);
  useEffect(()=>{const t=setInterval(()=>setBlink(b=>!b),600);return()=>clearInterval(t);},[]);
  return (
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:10,gap:20}}>
      {/* Title box */}
      <WinChrome title={`★ ${tweaks.gameTitle} ★`}>
        <div style={{background:'rgba(236,233,220,.97)',padding:'28px 52px',textAlign:'center',minWidth:380}}>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:7,color:'#666',letterSpacing:2,marginBottom:6}}>╔══════════════════╗</div>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:20,color:'#1056c0',letterSpacing:4,textShadow:'3px 3px 0 #ffd700,6px 6px 0 rgba(0,0,0,.1)',lineHeight:1.4,marginBottom:6}}>

/* ═══ CRT MONITOR CHARACTER SELECT ═══ */
function CharSelectScreen({tweaks,onSelect,onBack}) {
  const [idx,setIdx]=useState(0);
  const char=CHARS_DATA[idx];
  const name=tweaks[char.nameKey]||char.nameKey;

  const prev=()=>setIdx(i=>(i-1+CHARS_DATA.length)%CHARS_DATA.length);
  const next=()=>setIdx(i=>(i+1)%CHARS_DATA.length);

    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:10,gap:0}}>
      {/* Window title */}

              {/* CRT Monitor */}
              <div style={{position:'relative',flex:'0 0 auto'}}>
                <svg viewBox="0 0 380 320" width="380" style={{display:'block',filter:'drop-shadow(0 8px 24px rgba(0,0,0,.6))'}}>
                  {/* Monitor body */}
                  <rect x="10" y="8" width="360" height="266" rx="18" fill="#ccc8be" stroke="#b0aa9e" strokeWidth="3"/>
                  <rect x="10" y="8" width="360" height="140" rx="18" fill="#d4d0c6"/>
                  {/* Screen bezel */}
                  <rect x="28" y="22" width="324" height="242" rx="10" fill="#1a1a1a" stroke="#888" strokeWidth="1.5"/>
                  {/* Character image area inside screen */}
                  <foreignObject x="36" y="28" width="308" height="230" style={{borderRadius:6,overflow:'hidden'}}>
                    <div xmlns="http://www.w3.org/1999/xhtml" style={{
                      width:'100%',height:'100%',
                      backgroundImage:`url('${char.img}')`,
                      backgroundSize:char.bgSize,
                      backgroundPosition:char.stylePos['3d'],
                      backgroundRepeat:'no-repeat',
                      position:'relative'
                    }}>
                      {/* CRT vignette */}
                      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.5) 100%)'}}/>
                      {/* Scan lines */}
                      <div style={{position:'absolute',inset:0,background:'repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px)'}}/>
                      {/* Name overlay */}
                      <div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(0deg,rgba(0,0,0,.8),transparent)',padding:'14px 12px 8px'}}>
                        <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:11,color:char.accent,textShadow:`0 0 10px ${char.accent}`,letterSpacing:3}}>{name}</div>
                        <div style={{fontFamily:"'DotGothic16',monospace",fontSize:10,color:'rgba(255,255,255,.7)',marginTop:2}}>{char.typeKr} — {char.outfit}</div>
                      </div>
                    </div>
                  </foreignObject>
                  {/* CRT gloss */}
                  <ellipse cx="130" cy="80" rx="80" ry="40" fill="rgba(255,255,255,.06)" transform="rotate(-15,130,80)"/>
                  {/* Monitor controls */}
                  <circle cx="338" cy="255" r="5" fill="#666"/>
                  <rect x="26" y="255" width="280" height="4" rx="2" fill="#b0aa9e"/>
                  {/* Stand */}
                  <rect x="162" y="274" width="56" height="18" rx="4" fill="#bab6ac" stroke="#a0a098" strokeWidth="1"/>

                </svg>
                {/* Dot indicators */}
                <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:4}}>
                  {CHARS_DATA.map((_,i)=>(
                    <div key={i} onClick={()=>setIdx(i)} style={{
                      width:i===idx?20:8,height:8,borderRadius:4,cursor:'pointer',
                      background:i===idx?char.accent:'rgba(255,255,255,.3)',

              <button onClick={()=>onSelect(char.id)} style={{
                fontFamily:"'Press Start 2P',monospace",fontSize:9,padding:'11px 36px',
                background:char.accent,color:'#000',border:`2px solid ${char.accentDark}`,
                cursor:'pointer',letterSpacing:2,
                boxShadow:`0 0 16px ${char.accent}88,0 3px 0 ${char.accentDark}`
              }}>▶ SELECT — {name}</button>
            </div>
          </div>
        </WinChrome>
      </div>
    </div>
  );
}

/* ═══ STAT BAR (Sims style) ═══ */
function SimsStatBar({label,value,color}) {
  const [w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(value),200);return()=>clearTimeout(t);},[value]);
  const icon={'MUSIC':'🎵','STYLE':'👟','VIBE':'✨','MOOD':'😄'}[label]||'●';
  return (
    <div style={{display:'flex',alignItems:'center',gap:6}}>
      <div style={{fontSize:13}}>{icon}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:9,color:'rgba(200,240,180,.7)',fontFamily:"'DotGothic16',monospace",marginBottom:2,letterSpacing:1}}>{label}</div>
        <div style={{height:8,background:'rgba(0,0,0,.4)',borderRadius:4,border:'1px solid rgba(80,160,40,.3)',overflow:'hidden'}}>
          <div style={{width:`${w}%`,height:'100%',background:`linear-gradient(90deg,${color}88,${color})`,borderRadius:4,transition:'width 1s ease-out'}}/>
        </div>
      </div>
      <div style={{fontSize:9,fontFamily:"'Press Start 2P',monospace",color,width:24,textAlign:'right'}}>{value}</div>
    </div>
  );
}

/* ═══ CHARACTER ROOM SCREEN (Sims layout) ═══ */
function CharRoomScreen({char,name,tweaks,onBack}) {
  const [sub,setSub]=useState('main');
  const [affection,setAffection]=useState(2);
  const [storyIdx,setStoryIdx]=useState(0);
  const [styleMode,setStyleMode]=useState('3d');
  const [saved,setSaved]=useState(false);
  const [hearts,setHearts]=useState([]);
  const heartId=useRef(0);

  const stylePos=char.stylePos;

  function spawnHeart() {
    const id=heartId.current++;
    setHearts(h=>[...h,{id,x:Math.random()*60+20}]);
    setTimeout(()=>setHearts(h=>h.filter(x=>x.id!==id)),1200);
  }

  function gainAffection() {
    if(affection<5){setAffection(a=>a+1);spawnHeart();}
  }

  function handleSub(id) {
    if(id==='back'){onBack();return;}
    if(id==='save'){
      setSaved(true);setSub('save');gainAffection();
      setTimeout(()=>{setSaved(false);setSub('main');},2000);return;
    }
    if(id==='story'&&storyIdx===0)gainAffection();
    setSub(id);
  }

  const SIMS_BTNS=[
    {id:'story', label:'스토리...', icon:'💬', x:'8%',  y:'28%'},
    {id:'style', label:'스타일...', icon:'✨', x:'62%', y:'20%'},
    {id:'status',label:'스탯...',   icon:'⭐', x:'64%', y:'48%'},
    {id:'gallery',label:'갤러리...',icon:'🖼️', x:'6%',  y:'54%'},
    {id:'save',  label:'저장...',   icon:'💾', x:'28%', y:'72%'},
  ];

  const dialogues={
    main:`안녕! 나야, ${name}.`,
    style:'스타일 시트를 확인해봐. 픽셀 / 3D / 벡터 버전이 있어.',
    status:`내 현재 상태야.`,
    story:char.story[storyIdx]||char.story[0],
    gallery:'전체 스타일 시트야. 세 가지 버전 다 들어있어.',
    save:saved?'저장 완료! 💖':'지금 이 모습을 저장할까?',
  };

  return (
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',zIndex:10}}>
      {/* Top XP bar */}
      <div style={{background:'linear-gradient(90deg,#1056c0,#245edb)',padding:'4px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0,zIndex:5}}>
        <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:7,color:'#ffd700',letterSpacing:2}}>★ {tweaks.gameTitle}</span>
        <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:7,color:'rgba(255,255,255,.85)'}}>{name} — {char.typeKr}</span>
        <button onClick={onBack} style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,padding:'3px 8px',background:'rgba(0,0,0,.25)',color:'rgba(255,255,255,.65)',border:'1px solid rgba(255,255,255,.3)',cursor:'pointer'}}>◀ BACK</button>
      </div>

      {/* Main area: split layout */}
      <div style={{flex:1,display:'flex',overflow:'hidden',minHeight:0}}>

        {/* ── LEFT: Large character portrait + Sims buttons ── */}
        <div style={{position:'relative',flex:'0 0 62%',overflow:'hidden'}}>
          {/* Character image filling left pane */}
          <div style={{
            position:'absolute',inset:0,
            backgroundImage:`url('${char.img}')`,
            backgroundSize:char.bgSize,
            backgroundPosition:char.stylePos[styleMode],
            backgroundRepeat:'no-repeat',
            transition:'background-position .5s ease',
            imageRendering:styleMode==='pixel'?'pixelated':'auto'
          }}/>
          {/* Gradient overlays for readability */}
          <div style={{position:'absolute',inset:0,background:'linear-gradient(90deg,rgba(0,0,0,.05) 0%,transparent 40%,rgba(0,0,0,.4) 100%)'}}/>
          <div style={{position:'absolute',bottom:0,left:0,right:0,height:120,background:'linear-gradient(0deg,rgba(0,0,0,.55),transparent)'}}/>

          {/* Sims floating buttons (main menu only) */}
          {sub==='main'&&SIMS_BTNS.map((b,i)=>(
            <div key={b.id} className="sims-btn slide-up" onClick={()=>handleSub(b.id)}
              style={{position:'absolute',left:b.x,top:b.y,animationDelay:`${i*.06}s`}}>
              <span>{b.icon}</span><span>{b.label}</span>
            </div>
          ))}

          {/* Back button for sub screens */}
          {sub!=='main'&&sub!=='save'&&(
            <button className="sims-btn" onClick={()=>setSub('main')}
              style={{position:'absolute',bottom:16,left:16,background:'rgba(240,240,235,.92)'}}>
              ← 뒤로
            </button>
          )}

          {/* Affection hearts floating animation */}
          {hearts.map(h=>(
            <div key={h.id} style={{
              position:'absolute',left:`${h.x}%`,bottom:'20%',
              fontSize:24,animation:'heartPop 1.2s ease-out forwards',pointerEvents:'none'
            }}>♥</div>
          ))}

          {/* Style mode toggle (bottom of portrait when in style sub) */}
          {sub==='style'&&(
            <div className="slide-up" style={{position:'absolute',bottom:60,left:'50%',transform:'translateX(-50%)',display:'flex',gap:8}}>
              {['pixel','3d','vector'].map(m=>(
                <button key={m} onClick={()=>setStyleMode(m)} style={{
                  fontFamily:"'Press Start 2P',monospace",fontSize:7,padding:'7px 14px',
                  background:styleMode===m?char.accent:'rgba(230,245,215,.9)',
                  color:styleMode===m?'#000':'#1a3a0a',
                  border:`2px solid ${styleMode===m?char.accentDark:'rgba(80,130,50,.4)'}`,
                  borderRadius:20,cursor:'pointer',
                  boxShadow:styleMode===m?`0 0 14px ${char.accent}88,0 2px 0 ${char.accentDark}`:'0 2px 0 rgba(80,130,50,.3)'
                }}>{m==='pixel'?'PIXEL':m==='3d'?'3D':'VECTOR'}</button>
              ))}
            </div>
          )}
        </div>

        {/* ── RIGHT: Info + stats panel ── */}
        <div style={{flex:1,background:'rgba(12,18,8,.92)',display:'flex',flexDirection:'column',padding:'16px 14px',overflow:'hidden',borderLeft:'1px solid rgba(255,255,255,.08)'}}>

          {/* Character header */}
          <div style={{marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${char.accent}44`}}>
            <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:12,color:char.accent,letterSpacing:3,textShadow:`0 0 12px ${char.accent}66`}}>{name}</div>
            <div style={{fontFamily:"'DotGothic16',monospace",fontSize:11,color:'rgba(255,255,255,.5)',marginTop:3}}>{char.type} · {char.typeKr}</div>
            <div style={{fontFamily:"'DotGothic16',monospace",fontSize:10,color:'rgba(255,255,255,.35)',marginTop:2}}>{char.outfit}</div>
          </div>

          {/* Main sub panel */}
          {(sub==='main'||sub==='style')&&(
            <div className="slide-up">
              <div style={{fontSize:9,fontFamily:"'DotGothic16',monospace",color:'rgba(180,220,140,.7)',marginBottom:8,letterSpacing:2}}>── STATUS ──</div>
              <div style={{display:'flex',flexDirection:'column',gap:7}}>
                {Object.entries(char.stats).map(([k,v])=>(
                  <SimsStatBar key={k} label={k} value={v} color={char.accent}/>
                ))}
              </div>
              {/* Affection */}
              <div style={{marginTop:12,paddingTop:10,borderTop:'1px solid rgba(255,255,255,.08)'}}>
                <div style={{fontSize:9,fontFamily:"'DotGothic16',monospace",color:'rgba(180,220,140,.7)',marginBottom:6,letterSpacing:2}}>── 호감도 ──</div>
                <div style={{display:'flex',gap:5}}>
                  {Array.from({length:5},(_,i)=>(
                    <svg key={i} width="20" height="18" viewBox="0 0 24 22">
                      <path d="M12 20C6 14 1 10 1 6Q1 2 5 2Q9 2 12 6Q15 2 19 2Q23 2 23 6C23 10 18 14 12 20Z"
                        fill={i<affection?char.accent:'rgba(100,120,80,.3)'} stroke={char.accent} strokeWidth="1.5" opacity={i<affection?1:.4}/>
                    </svg>
                  ))}
                </div>
              </div>
              {/* Gear */}
              <div style={{marginTop:12,paddingTop:10,borderTop:'1px solid rgba(255,255,255,.08)'}}>
                <div style={{fontSize:9,fontFamily:"'DotGothic16',monospace",color:'rgba(180,220,140,.7)',marginBottom:4,letterSpacing:2}}>── GEAR ──</div>
                <div style={{fontSize:11,color:'rgba(255,255,255,.5)',fontFamily:"'DotGothic16',monospace"}}>{char.gear}</div>
              </div>
            </div>
          )}

          {/* Story sub */}
          {sub==='story'&&(
            <div className="slide-up" style={{flex:1,display:'flex',flexDirection:'column',gap:10}}>
              <div style={{fontSize:9,fontFamily:"'DotGothic16',monospace",color:'rgba(180,220,140,.7)',letterSpacing:2}}>── STORY ──</div>
              <div style={{display:'flex',gap:5}}>
                {char.story.map((_,i)=>(
                  <div key={i} onClick={()=>setStoryIdx(i)} style={{
                    height:6,flex:1,maxWidth:28,borderRadius:3,cursor:'pointer',
                    background:i<=storyIdx?char.accent:'rgba(255,255,255,.2)',
                    border:`1px solid ${char.accent}66`,transition:'all .2s'
                  }}/>
                ))}
              </div>
              <div style={{background:'rgba(0,0,0,.3)',border:`1px solid ${char.accent}44`,borderRadius:6,padding:'12px',flex:1}}>
                <p style={{fontFamily:"'DotGothic16',monospace",fontSize:14,color:'rgba(255,255,255,.9)',lineHeight:1.65,margin:0}}>
                  "{char.story[storyIdx]}"
                </p>
              </div>
              <div style={{display:'flex',justifyContent:'flex-end'}}>
                {storyIdx<char.story.length-1
                  ?<button onClick={()=>{setStoryIdx(i=>i+1);gainAffection();}} style={{
                    fontFamily:"'Press Start 2P',monospace",fontSize:7,padding:'7px 16px',
                    background:char.accent,color:'#000',border:'none',borderRadius:20,cursor:'pointer',
                    boxShadow:`0 2px 0 ${char.accentDark}`
                  }}>NEXT ▶</button>
                  :<button onClick={()=>setSub('main')} style={{
                    fontFamily:"'Press Start 2P',monospace",fontSize:7,padding:'7px 16px',
                    background:char.accent,color:'#000',border:'none',borderRadius:20,cursor:'pointer'
                  }}>★ 완료</button>
                }
              </div>
            </div>
          )}

          {/* Gallery sub */}
          {sub==='gallery'&&(
            <div className="slide-up">
              <div style={{fontSize:9,fontFamily:"'DotGothic16',monospace",color:'rgba(180,220,140,.7)',marginBottom:8,letterSpacing:2}}>── STYLE SHEET ──</div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {['pixel','3d','vector'].map(m=>(
                  <div key={m} onClick={()=>{setStyleMode(m);setSub('style');}} style={{
                    display:'flex',alignItems:'center',gap:8,padding:'6px 8px',
                    background:'rgba(0,0,0,.3)',border:`1px solid ${styleMode===m?char.accent:'rgba(255,255,255,.1)'}`,
                    borderRadius:6,cursor:'pointer',transition:'all .15s'
                  }}>
                    <div style={{width:48,height:56,backgroundImage:`url('${char.img}')`,backgroundSize:char.bgSize,backgroundPosition:char.stylePos[m],backgroundRepeat:'no-repeat',borderRadius:3,flexShrink:0,imageRendering:m==='pixel'?'pixelated':'auto'}}/>
                    <div>
                      <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:char.accent}}>{m.toUpperCase()}</div>
                      <div style={{fontFamily:"'DotGothic16',monospace",fontSize:10,color:'rgba(255,255,255,.5)',marginTop:2}}>{m==='pixel'?'픽셀아트':m==='3d'?'3D 렌더':'벡터'} 버전</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Status sub */}
          {sub==='status'&&(
            <div className="slide-up">
              <div style={{fontSize:9,fontFamily:"'DotGothic16',monospace",color:'rgba(180,220,140,.7)',marginBottom:8,letterSpacing:2}}>── STATUS ──</div>
              <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:12}}>
                {Object.entries(char.stats).map(([k,v])=>(
                  <SimsStatBar key={k} label={k} value={v} color={char.accent}/>
                ))}
              </div>
              <div style={{fontSize:9,fontFamily:"'DotGothic16',monospace",color:'rgba(180,220,140,.7)',marginBottom:8,letterSpacing:2}}>── 호감도 ──</div>
              <div style={{display:'flex',gap:5,marginBottom:12}}>
                {Array.from({length:5},(_,i)=>(
                  <svg key={i} width="22" height="20" viewBox="0 0 24 22">
                    <path d="M12 20C6 14 1 10 1 6Q1 2 5 2Q9 2 12 6Q15 2 19 2Q23 2 23 6C23 10 18 14 12 20Z"
                      fill={i<affection?char.accent:'rgba(100,120,80,.3)'} stroke={char.accent} strokeWidth="1.5" opacity={i<affection?1:.4}/>
                  </svg>
                ))}
              </div>
            </div>
          )}

          {/* Save sub */}
          {sub==='save'&&(
            <div className="slide-up" style={{textAlign:'center',padding:'20px 0'}}>
              <div style={{fontSize:36,marginBottom:10}}>💖</div>
              <div style={{fontFamily:"'DotGothic16',monospace",fontSize:14,color:char.accent,fontWeight:'bold'}}>저장 완료!</div>
              <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'rgba(180,220,140,.7)',marginTop:6}}>SAVED ★</div>
            </div>
          )}

          {/* Bottom: exit + save shortcut */}
          <div style={{marginTop:'auto',paddingTop:10,borderTop:'1px solid rgba(255,255,255,.08)'}}>
            {sub==='main'&&(
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                <button onClick={()=>handleSub('save')} className="sims-btn" style={{justifyContent:'center',width:'100%'}}>
                  💾 저장하기
                </button>
                <button onClick={onBack} style={{
                  fontFamily:"'DotGothic16',monospace",fontSize:12,padding:'7px 0',width:'100%',
                  background:'rgba(240,240,235,.88)',color:'#1a3a0a',
                  border:'1.5px solid rgba(80,130,50,.4)',borderRadius:22,cursor:'pointer',
                  fontWeight:'bold'
                }}>🚪 방에서 나가기</button>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Dialogue box */}
      <div style={{flexShrink:0,background:'rgba(248,248,244,.97)',borderTop:'2px solid rgba(80,130,50,.4)',padding:'14px 16px 12px',position:'relative'}}>
        <div style={{position:'absolute',top:-11,left:16,background:char.accent,color:'#000',padding:'2px 12px',borderRadius:'6px 6px 0 0',fontFamily:"'DotGothic16',monospace",fontSize:11,fontWeight:'bold',letterSpacing:1}}>
          {name}
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
          <p style={{fontFamily:"'DotGothic16',monospace",fontSize:14,color:'#1a2a0a',lineHeight:1.5,margin:0,flex:1}}>
            {dialogues[sub]||dialogues.main}
          </p>
          <span style={{fontSize:12,color:char.accent,animation:'blink 1s step-end infinite',flexShrink:0}}>▼</span>
        </div>
      </div>
    </div>
  );
}

/* ═══ TWEAKS PANEL ═══ */
function TweaksPanel({tweaks,setTweaks,onClose}) {
  const upd=(k,v)=>{
    const n={...tweaks,[k]:v};setTweaks(n);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');
  };
  return (
    <div style={{position:'fixed',bottom:20,right:20,zIndex:99999,background:'rgba(10,16,8,.97)',border:'2px solid rgba(130,200,80,.4)',borderRadius:8,padding:16,minWidth:220,fontFamily:"'Press Start 2P',monospace",fontSize:7,boxShadow:'0 4px 24px rgba(0,0,0,.6)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{color:'#8dc860',fontSize:8,letterSpacing:2}}>✦ TWEAKS</span>
        <span style={{cursor:'pointer',color:'rgba(255,255,255,.4)',fontSize:12}} onClick={onClose}>✕</span>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{color:'rgba(180,220,140,.6)',marginBottom:6}}>GAME TITLE</div>
        <input value={tweaks.gameTitle} onChange={e=>upd('gameTitle',e.target.value)} style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,background:'rgba(255,255,255,.08)',border:'1px solid rgba(130,200,80,.3)',color:'#8dc860',padding:'5px 8px',width:'100%'}}/>
      </div>
      <div style={{color:'rgba(180,220,140,.6)',marginBottom:6}}>CHARACTER NAMES</div>
      {CHARS_DATA.map(c=>(
        <div key={c.id} style={{display:'flex',alignItems:'center',gap:6,marginBottom:5}}>
          <div style={{width:6,height:6,background:c.accent,flexShrink:0,borderRadius:1}}/>
          <input value={tweaks[c.nameKey]||''} onChange={e=>upd(c.nameKey,e.target.value)} style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,background:'rgba(255,255,255,.07)',border:`1px solid ${c.accent}44`,color:c.accent,padding:'4px 6px',flex:1}}/>
        </div>
      ))}
    </div>
  );
}

/* ═══ APP ═══ */
function App() {
  const [screen,setScreen]=useState('title');
  const [selected,setSelected]=useState(null);
  const [tweaks,setTweaks]=useState(TWEAK_DEFAULTS);
  const [showTweaks,setShowTweaks]=useState(false);

  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode')setShowTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode')setShowTweaks(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const selChar=selected!==null?CHARS_DATA[selected]:null;
  const selName=selChar?(tweaks[selChar.nameKey]||selChar.nameKey):'';

  return (
    <div style={{width:'100vw',height:'100vh',position:'relative',overflow:'hidden'}}>
      {/* XP rolling hills always visible in background */}
      <XPBackground/>
      {/* Scanlines */}
      <div style={{position:'fixed',inset:0,background:'repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px)',pointerEvents:'none',zIndex:9998}}/>

      {screen==='title'&&<TitleScreen tweaks={tweaks} onStart={()=>setScreen('select')}/>}
      {screen==='select'&&<CharSelectScreen tweaks={tweaks} onSelect={id=>{setSelected(id);setScreen('room');}} onBack={()=>setScreen('title')}/>}
      {screen==='room'&&selChar&&<CharRoomScreen char={selChar} name={selName} tweaks={tweaks} onBack={()=>setScreen('select')}/>}

      {showTweaks&&<TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={()=>{setShowTweaks(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
